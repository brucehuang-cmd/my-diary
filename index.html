<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的日记本</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --primary: #764ba2;
    --primary-light: #f3eefa;
    --bg: #fff;
    --bg-soft: #fafafa;
    --text: #333;
    --text-soft: #555;
    --text-muted: #888;
    --border: #e0e0e0;
    --panel-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }
  [data-theme="dark"] {
    --bg-grad: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    --primary: #a78bfa;
    --primary-light: #2d2456;
    --bg: #1e1e2e;
    --bg-soft: #252535;
    --text: #e0e0e0;
    --text-soft: #c0c0c0;
    --text-muted: #888;
    --border: #3a3a4a;
    --panel-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  body {
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
    background: var(--bg-grad);
    min-height: 100vh;
    color: var(--text);
    transition: background 0.5s;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  header {
    text-align: center;
    color: #fff;
    padding: 30px 0;
    position: relative;
  }
  header h1 { font-size: 2.2em; margin-bottom: 5px; }
  header p { opacity: 0.85; font-size: 0.95em; }
  .sync-status {
    position: absolute;
    top: 30px;
    left: 10px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
  .sync-dot.offline { background: #f87171; }
  .sync-dot.syncing { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .theme-toggle {
    position: absolute;
    top: 30px;
    right: 10px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.3em;
    transition: all 0.3s;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.35); transform: rotate(20deg); }
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1; padding: 12px; border: none;
    background: rgba(255,255,255,0.2); color: #fff;
    border-radius: 8px; cursor: pointer; font-size: 1em;
    transition: all 0.3s;
  }
  .tab-btn.active { background: #fff; color: var(--primary); font-weight: bold; }
  [data-theme="dark"] .tab-btn.active { background: var(--bg); color: var(--primary); }
  .panel {
    background: var(--bg);
    border-radius: 12px; padding: 25px;
    box-shadow: var(--panel-shadow);
    display: none;
  }
  .panel.active { display: block; }
  .form-group { margin-bottom: 18px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-soft); }
  input[type="text"], input[type="email"], input[type="date"], input[type="password"], textarea, select {
    width: 100%; padding: 10px 12px;
    border: 2px solid var(--border); border-radius: 8px;
    font-size: 1em; font-family: inherit;
    background: var(--bg); color: var(--text);
    transition: border 0.3s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
  textarea { resize: vertical; min-height: 150px; }
  .mood-row, .weather-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .emoji-btn {
    font-size: 1.6em; padding: 6px 12px;
    border: 2px solid var(--border); border-radius: 8px;
    cursor: pointer; background: var(--bg);
    transition: all 0.2s;
  }
  .emoji-btn.selected { border-color: var(--primary); background: var(--primary-light); transform: scale(1.1); }
  .tags-input-wrapper { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border: 2px solid var(--border); border-radius: 8px; min-height: 44px; }
  .tag-chip {
    background: var(--primary-light); color: var(--primary);
    padding: 3px 10px; border-radius: 12px; font-size: 0.85em;
    display: flex; align-items: center; gap: 4px;
  }
  .tag-chip span { cursor: pointer; font-weight: bold; }
  .tags-input-wrapper input { border: none; outline: none; flex: 1; min-width: 100px; padding: 4px; background: transparent; color: var(--text); }
  .btn-primary {
    background: var(--bg-grad); color: #fff; border: none;
    padding: 12px 30px; border-radius: 8px; font-size: 1.05em; cursor: pointer;
  }
  .btn-secondary {
    background: var(--border); color: var(--text-soft); border: none;
    padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1em; margin-left: 10px;
  }
  .word-count { text-align: right; color: var(--text-muted); font-size: 0.85em; margin-top: 4px; }
  .diary-list { display: flex; flex-direction: column; gap: 15px; }
  .diary-item {
    border-left: 4px solid var(--primary);
    background: var(--bg-soft); padding: 15px 18px;
    border-radius: 0 8px 8px 0; transition: all 0.2s;
    position: relative;
  }
  .diary-item.pinned { border-left-color: #f59e0b; background: linear-gradient(90deg, rgba(245,158,11,0.08), var(--bg-soft) 30%); }
  .diary-item:hover { transform: translateX(3px); }
  .diary-item .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .diary-item .date { color: var(--text-muted); font-size: 0.85em; }
  .diary-item .mood-weather { font-size: 1.3em; display: flex; gap: 6px; align-items: center; }
  .diary-item h3 { color: var(--text); margin-bottom: 6px; }
  .diary-item .content { color: var(--text-soft); line-height: 1.7; white-space: pre-wrap; }
  .diary-item .tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .diary-item .tags span { background: var(--primary-light); color: var(--primary); padding: 2px 10px; border-radius: 10px; font-size: 0.78em; }
  .diary-item .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .diary-item .actions button { border: none; padding: 5px 14px; border-radius: 5px; cursor: pointer; font-size: 0.85em; }
  .btn-edit { background: var(--primary-light); color: var(--primary); }
  .btn-del { background: #fce8e8; color: #d33; }
  .btn-pin { background: #fef3c7; color: #d97706; }
  .btn-copy { background: #e0f2fe; color: #0284c7; }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); }
  .stats { display: flex; gap: 15px; margin-bottom: 20px; }
  .stat-card {
    flex: 1; background: var(--bg-grad); color: #fff;
    padding: 15px; border-radius: 10px; text-align: center;
  }
  .stat-card .num { font-size: 1.8em; font-weight: bold; }
  .stat-card .label { font-size: 0.85em; opacity: 0.9; }
  .search-box {
    width: 100%; padding: 10px 14px;
    border: 2px solid var(--border); border-radius: 20px;
    margin-bottom: 12px; font-size: 0.95em;
    background: var(--bg); color: var(--text);
  }
  .search-box:focus { outline: none; border-color: var(--primary); }
  .filter-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-row select { flex: 1; min-width: 120px; padding: 8px; border-radius: 8px; border: 2px solid var(--border); background: var(--bg); color: var(--text); }
  .calendar { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .calendar th { padding: 8px; color: var(--text-muted); font-size: 0.85em; }
  .calendar td { padding: 0; text-align: center; }
  .cal-day {
    width: 100%; aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    border-radius: 8px; transition: all 0.2s; position: relative; font-size: 0.9em;
  }
  .cal-day:hover { background: var(--primary-light); }
  .cal-day.has-diary { background: var(--primary); color: #fff; font-weight: bold; }
  .cal-day.has-diary:hover { background: var(--primary); opacity: 0.85; }
  .cal-day.today { border: 2px solid #f59e0b; }
  .cal-day.other-month { opacity: 0.3; }
  .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: #f59e0b; margin-top: 2px; }
  .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cal-nav button { background: var(--primary-light); color: var(--primary); border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .cal-nav span { font-weight: bold; color: var(--text); }
  .lock-screen {
    position: fixed; inset: 0; background: var(--bg-grad);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; color: #fff;
  }
  .lock-screen input { width: 200px; text-align: center; font-size: 1.5em; letter-spacing: 0.5em; }
  .lock-screen .btn-primary { margin-top: 15px; }
  .lock-screen h2 { margin-bottom: 20px; }
  .lock-screen .hint { margin-top: 10px; opacity: 0.7; font-size: 0.85em; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .toolbar button { background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-soft); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
  .toolbar button:hover { border-color: var(--primary); color: var(--primary); }
  .draft-badge { display: inline-block; background: #fef3c7; color: #d97706; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; margin-left: 8px; }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 12px 24px;
    border-radius: 8px; z-index: 1000; opacity: 0;
    transition: opacity 0.3s; font-size: 0.9em;
  }
  .toast.show { opacity: 1; }
  /* 认证界面 */
  .auth-screen {
    position: fixed; inset: 0; background: var(--bg-grad);
    display: flex; align-items: center; justify-content: center;
    z-index: 998; color: #fff;
  }
  .auth-box {
    background: #fff; color: #333;
    border-radius: 16px; padding: 35px 30px;
    width: 420px; max-width: 92vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .auth-box h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
  .auth-box p { text-align: center; color: var(--text-muted); font-size: 0.85em; margin-bottom: 25px; }
  .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .auth-tab {
    flex: 1; padding: 10px; border: 2px solid var(--border);
    background: #fff; color: var(--text-soft); border-radius: 8px;
    cursor: pointer; font-size: 0.95em; transition: all 0.2s;
  }
  .auth-tab.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: bold; }
  .auth-box input { margin-bottom: 12px; width: 100%; box-sizing: border-box; }
  .auth-box .btn-primary { width: 100%; margin-top: 5px; box-sizing: border-box; }
  .auth-error { color: #e53e3e; font-size: 0.85em; text-align: center; min-height: 1.2em; margin-bottom: 8px; }
  .user-info {
    position: absolute; top: 30px; right: 60px;
    background: rgba(255,255,255,0.2); color: #fff;
    padding: 6px 14px; border-radius: 20px; font-size: 0.8em;
    display: flex; align-items: center; gap: 8px;
  }
  .user-info button { background: rgba(255,255,255,0.2); border: none; color: #fff; cursor: pointer; padding: 2px 8px; border-radius: 10px; font-size: 0.9em; }
  .pwd-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.1em; user-select: none; }
  .auth-links { text-align: center; margin-top: 15px; }
  .auth-links a { color: var(--primary); font-size: 0.85em; text-decoration: none; }
  .auth-links a:hover { text-decoration: underline; }
  .auth-loading { display: flex; justify-content: center; margin-top: 15px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-box .form-group { margin-bottom: 14px; }
  /* 昵称弹窗 */
  .nickname-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1001;
  }
  .nickname-box {
    background: #fff; border-radius: 16px; padding: 35px 30px;
    width: 400px; max-width: 90vw; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .nickname-box h2 { color: var(--primary); margin-bottom: 8px; }
  .nickname-box p { color: var(--text-muted); font-size: 0.85em; margin-bottom: 20px; }
  .nickname-box input { margin-bottom: 15px; }
  .nickname-box .btn-primary { width: 100%; box-sizing: border-box; }
  /* 好友 */
  .friend-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 15px; background: var(--bg-soft); border-radius: 8px;
    margin-bottom: 8px; transition: all 0.2s;
  }
  .friend-card:hover { background: var(--primary-light); }
  .friend-info { display: flex; align-items: center; gap: 10px; }
  .friend-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg-grad); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1em; font-weight: bold;
  }
  .friend-name { font-weight: 600; }
  .friend-email { font-size: 0.8em; color: var(--text-muted); }
  .friend-actions { display: flex; gap: 6px; }
  .friend-actions button {
    border: none; padding: 5px 12px; border-radius: 5px;
    cursor: pointer; font-size: 0.85em;
  }
  .btn-accept { background: #d4f5d4; color: #2d7a2d; }
  .btn-reject { background: #fce8e8; color: #d33; }
  .btn-msg { background: var(--primary-light); color: var(--primary); }
  .btn-view { background: #e0f2fe; color: #0284c7; }
  .btn-add { background: var(--primary-light); color: var(--primary); }
  /* 私信弹窗 */
  .chat-box {
    background: var(--bg); border-radius: 16px;
    width: 420px; max-width: 92vw; height: 500px; max-height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .chat-header {
    padding: 15px 20px; background: var(--bg-grad); color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .chat-header button { background: rgba(255,255,255,0.2); border: none; color: #fff; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-soft); }
  .chat-bubble { max-width: 75%; padding: 8px 14px; border-radius: 12px; font-size: 0.9em; line-height: 1.5; word-break: break-word; }
  .chat-bubble.sent { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .chat-bubble.received { align-self: flex-start; background: #fff; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .chat-time { font-size: 0.7em; color: var(--text-muted); margin-top: 2px; }
  .chat-input { padding: 12px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  .chat-input input { flex: 1; }
  .chat-input button { background: var(--primary); color: #fff; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
  .visibility-badge { font-size: 0.7em; padding: 1px 8px; border-radius: 8px; margin-left: 6px; }
  .vis-private { background: #fce8e8; color: #d33; }
  .vis-friends { background: #e0f2fe; color: #0284c7; }
  .vis-public { background: #d4f5d4; color: #2d7a2d; }
  .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; display: inline-block; }
</style>
</head>
<body>

<!-- 锁屏 -->
<div class="lock-screen" id="lockScreen" style="display:none">
  <h2>🔒 日记本已上锁</h2>
  <input type="password" id="pinInput" placeholder="PIN" maxlength="6" onkeydown="if(event.key==='Enter')unlock()">
  <button class="btn-primary" onclick="unlock()">🔓 解锁</button>
  <div class="hint" id="lockHint"></div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<!-- 登录/注册界面 -->
<div class="auth-screen" id="authScreen" style="display:none">
  <div class="auth-box">
    <h2>📖 我的日记本</h2>
    <p>记录每一天的心情与故事</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">登录</button>
      <button class="auth-tab" id="tabSignup" onclick="switchAuth('signup')">注册</button>
    </div>
    <div class="form-group">
      <input type="email" id="authEmail" placeholder="📧 邮箱" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div class="form-group" style="position:relative">
      <input type="password" id="authPassword" placeholder="🔒 密码（至少6位）" onkeydown="if(event.key==='Enter')doAuth()">
      <span class="pwd-toggle" onclick="togglePwd('authPassword',this)">👁️</span>
    </div>
    <div class="form-group" id="confirmGroup" style="position:relative;display:none">
      <input type="password" id="authConfirm" placeholder="🔒 确认密码" onkeydown="if(event.key==='Enter')doAuth()">
      <span class="pwd-toggle" onclick="togglePwd('authConfirm',this)">👁️</span>
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn-primary" onclick="doAuth()" id="authBtn">登录</button>
    <div class="auth-links">
      <a href="#" id="forgotLink" onclick="showForgot();return false">忘记密码？</a>
      <a href="#" id="resendLink" onclick="resendConfirm();return false" style="display:none">没收到确认邮件？</a>
    </div>
    <div id="forgotBox" style="display:none;margin-top:15px">
      <input type="email" id="forgotEmail" placeholder="📧 输入注册邮箱">
      <button class="btn-secondary" style="width:100%;margin-left:0;margin-top:8px" onclick="sendReset()">发送重置邮件</button>
    </div>
    <div class="auth-loading" id="authLoading" style="display:none">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- 昵称设置弹窗 -->
<div class="nickname-modal" id="nicknameModal" style="display:none">
  <div class="nickname-box">
    <h2>👋 欢迎使用</h2>
    <p>请输入你的昵称，让大家认识你</p>
    <input type="text" id="nicknameInput" placeholder="你的昵称（如：小明）" maxlength="20" onkeydown="if(event.key==='Enter')saveNickname()">
    <button class="btn-primary" onclick="saveNickname()">确定</button>
  </div>
</div>

<div class="container">
  <header>
    <div class="sync-status" id="syncStatus">
      <div class="sync-dot syncing" id="syncDot"></div>
      <span id="syncText">同步中...</span>
    </div>
    <h1 id="diaryTitle">📖 我的日记本</h1>
    <p>记录每一天的心情与故事 · 云端同步</p>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="user-info" id="userInfo" style="display:none">
      <span id="userDisplay"></span>
      <button onclick="editNickname()" title="修改昵称">✏️</button>
      <button onclick="doLogout()">退出</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('write', this)">✏️ 写日记</button>
    <button class="tab-btn" onclick="switchTab('list', this)">📚 日记列表</button>
    <button class="tab-btn" onclick="switchTab('calendar', this)">📅 日历</button>
    <button class="tab-btn" onclick="switchTab('friends', this)" id="tabFriends" style="position:relative">👥 好友 <span id="friendBadge" style="display:none;background:#ef4444;color:#fff;font-size:0.7em;padding:1px 6px;border-radius:10px;margin-left:2px"></span></button>
    <button class="tab-btn" onclick="switchTab('settings', this)">⚙️ 设置</button>
  </div>

  <!-- 写日记 -->
  <div id="panel-write" class="panel active">
    <div class="form-group">
      <label>📅 日期</label>
      <input type="date" id="diary-date">
    </div>
    <div class="form-group">
      <label>📝 标题</label>
      <input type="text" id="diary-title" placeholder="给今天起个标题...">
    </div>
    <div class="form-group">
      <label>😊 心情</label>
      <div class="mood-row" id="mood-row">
        <button class="emoji-btn" data-mood="😊">😊</button>
        <button class="emoji-btn" data-mood="😢">😢</button>
        <button class="emoji-btn" data-mood="😡">😡</button>
        <button class="emoji-btn" data-mood="😍">😍</button>
        <button class="emoji-btn" data-mood="😴">😴</button>
        <button class="emoji-btn" data-mood="🤔">🤔</button>
        <button class="emoji-btn" data-mood="🎉">🎉</button>
        <button class="emoji-btn" data-mood="😌">😌</button>
      </div>
    </div>
    <div class="form-group">

async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const confirm = document.getElementById('authConfirm').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  errEl.style.color = '#e53e3e';

  // 验证
  if (!email) { errEl.textContent = '请输入邮箱'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = '邮箱格式不正确'; return; }
  if (!password) { errEl.textContent = '请输入密码'; return; }
  if (password.length < 6) { errEl.textContent = '密码至少6位'; return; }
  if (authMode === 'signup' && password !== confirm) { errEl.textContent = '两次密码不一致'; return; }

  setAuthLoading(true);
  document.getElementById('authBtn').textContent = '处理中...';

  try {
    if (authMode === 'signup') {
      const { data, error } = await sbClient.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user && !data.session) {
        errEl.style.color = '#38a169';
        errEl.textContent = '✅ 注册成功！请检查邮箱确认后登录';
        document.getElementById('resendLink').style.display = 'inline';
        document.getElementById('authBtn').textContent = '登录';
        switchAuth('login');
        document.getElementById('authPassword').value = '';
        setAuthLoading(false);
        return;
      }
      // 如果不需要邮箱确认，直接登录
      showToast('✅ 注册成功！');
    } else {
      const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
      if (error) {
        if (error.message.includes('Email not confirmed')) {
          errEl.textContent = '邮箱未确认，请检查邮件';
          document.getElementById('resendLink').style.display = 'inline';
        } else if (error.message.includes('Invalid login')) {
          errEl.textContent = '邮箱或密码错误';
        } else {
          throw error;
        }
        setAuthLoading(false);
        document.getElementById('authBtn').textContent = '登录';
        return;
      }
    }
    await checkAuth();
  } catch (e) {
    let msg = e.message || '操作失败';
    if (msg.includes('already registered')) msg = '该邮箱已注册，请直接登录';
    if (msg.includes('rate limit')) msg = '操作太频繁，请稍后再试';
    errEl.textContent = '❌ ' + msg;
    document.getElementById('authBtn').textContent = authMode === 'login' ? '登录' : '注册';
    setAuthLoading(false);
  }
}

async function ensureProfile() {

// 搜索好友
async function searchFriend() {
  const q = document.getElementById('friendSearch').value.trim();
  const box = document.getElementById('searchResults');
  if (!q) { box.innerHTML = ''; return; }
  if (!currentUser) { box.innerHTML = '<div class="empty">请先登录</div>'; return; }
  try {
    // 先拉取所有用户，本地过滤（避免 or 语法问题）
    const { data, error } = await sbClient.from('profiles')
      .select('*')
      .neq('user_id', currentUser.id);
    if (error) throw error;
    const filtered = (data || []).filter(p =>
      (p.nickname || '').toLowerCase().includes(q.toLowerCase()) ||
      (p.email || '').toLowerCase().includes(q.toLowerCase())
    );
    if (filtered.length === 0) {
      box.innerHTML = '<div class="empty">未找到用户</div>';
      return;
    }
    box.innerHTML = filtered.map(p => `
      <div class="friend-card">
        <div class="friend-info">
          <div class="friend-avatar">${(p.nickname||'?')[0]}</div>
          <div>
            <div class="friend-name">${escapeHtml(p.nickname || '未命名')}</div>
            <div class="friend-email">${escapeHtml(p.email)}</div>
          </div>
        </div>
        <div class="friend-actions">
          <button class="btn-add" onclick="sendFriendRequest('${p.user_id}')">➕ 加好友</button>
        </div>
      </div>
    `).join('');
  } catch(e) { box.innerHTML = '<div class="empty">搜索失败: ' + e.message + '</div>'; }
}

// 发送好友请求
async function sendFriendRequest(targetId) {
  // 检查是否已存在关系
  try {
    const [sent, received] = await Promise.all([
      sbClient.from('friendships').select('*').eq('requester_id', currentUser.id).eq('addressee_id', targetId),
      sbClient.from('friendships').select('*').eq('requester_id', targetId).eq('addressee_id', currentUser.id)
    ]);
    const existing = [...(sent.data||[]), ...(received.data||[])];
    if (existing.length > 0) {
      const f = existing[0];
      if (f.status === 'accepted') { showToast('你们已经是好友了'); return; }
      if (f.status === 'pending') {
        if (f.requester_id === currentUser.id) { showToast('已发送过请求，等待对方确认'); return; }
        else { showToast('对方已向你发送请求，请去好友请求列表接受'); return; }
      }
      if (f.status === 'rejected') { showToast('之前被拒绝，无法重复添加'); return; }
    }
  } catch(e) { /* 忽略检查错误，继续尝试 */ }

  try {
    const { error } = await sbClient.from('friendships').insert({
      id: Date.now(),
      requester_id: currentUser.id,
      addressee_id: targetId,
      status: 'pending',
      relation_type: 'friend',
      created: new Date().toISOString()
    });
    if (error) {
      if (error.message.includes('duplicate')) showToast('已发送过请求');
      else throw error;
    } else {
      showToast('✅ 好友请求已发送');
      searchFriend(); // 刷新搜索结果
    }
  } catch(e) { showToast('❌ ' + e.message); }
}

      sbClient.from('friendships').select('*, profiles!friendships_addressee_id_fkey(nickname,email), req:profiles!friendships_requester_id_fkey(nickname,email)').eq('addressee_id', currentUser.id)
    ]);
    const data = [...(sent.data||[]), ...(received.data||[])];
    pendingRequests = data.filter(f => f.addressee_id === currentUser.id && f.status === 'pending');
    friendsList = data.filter(f => f.status === 'accepted');
    renderFriendRequests();
    renderFriendsList();
    updateFriendBadge();
  } catch(e) { console.error(e); }
}

// ===== 私信 =====
async function openChat(friendId, friendName) {
  chatPartnerId = friendId;
  document.getElementById('chatTitle').textContent = '💬 ' + friendName;
  document.getElementById('chatModal').style.display = 'flex';
  document.getElementById('chatInput').focus();
  await loadMessages();
  // 轮询新消息
  chatPollTimer = setInterval(loadMessages, 3000);
}

function closeChat() {
  document.getElementById('chatModal').style.display = 'none';
  chatPartnerId = null;
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
}

async function loadMessages() {
  if (!chatPartnerId) return;
  try {
    const { data, error } = await sbClient.from('messages')
      .select('*')
      .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${chatPartnerId}),and(sender_id.eq.${chatPartnerId},receiver_id.eq.${currentUser.id})`)
      .order('created', { ascending: true });
    if (error) throw error;
    renderMessages(data || []);
    // 标记已读
    await sbClient.from('messages').update({ is_read: true })
      .eq('sender_id', chatPartnerId).eq('receiver_id', currentUser.id);
  } catch(e) {}
}

function renderMessages(msgs) {
  const box = document.getElementById('chatMessages');
  box.innerHTML = msgs.map(m => {
    const sent = m.sender_id === currentUser.id;
    return `
      <div class="chat-bubble ${sent ? 'sent' : 'received'}">
        ${escapeHtml(m.content)}
        <div class="chat-time">${m.created ? new Date(m.created).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</div>
      </div>
    `;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chatInput');
  const content = inp.value.trim();
  if (!content || !chatPartnerId) return;
  inp.value = '';
  try {
    const { error } = await sbClient.from('messages').insert({
      id: Date.now(),
      sender_id: currentUser.id,
      receiver_id: chatPartnerId,
      content: content,
      created: new Date().toISOString(),
      is_read: false
    });
    if (error) throw error;
    await loadMessages();
  } catch(e) { showToast('❌ 发送失败'); }
}

// ===== 云端同步 =====
async function syncFromCloud() {
  if (!currentUser) { setSyncStatus('offline', '未登录'); return; }
  setSyncStatus('syncing', '从云端拉取...');
  try {
    const { data, error } = await sbClient.from(TABLE).select('*').order('date', { ascending: false });
    if (error) throw error;
    if (data) {
      diaries = data.map(d => ({
        id: d.id, date: d.date, title: d.title, content: d.content,
        mood: d.mood, weather: d.weather, tags: d.tags || [],
        pinned: d.pinned || false, created: d.created, updated: d.updated,
        user_id: currentUser.id
      }));
      localStorage.setItem('diaries', JSON.stringify(diaries));
    }
    setSyncStatus('', '已同步 · ' + new Date().toLocaleTimeString());
    showToast('☁️ 已从云端拉取 ' + diaries.length + ' 篇日记');
  } catch (e) {
    setSyncStatus('offline', '同步失败');
    showToast('❌ 同步失败: ' + e.message);
  }
}

async function syncToCloud() {
  if (diaries.length === 0) { showToast('没有本地数据'); return; }
  setSyncStatus('syncing', '上传到云端...');
  try {
    // 先清空云端，再批量插入
    const { error: delErr } = await sbClient.from(TABLE).delete().neq('id', 0);
    if (delErr) throw delErr;
    const { error: insErr } = await sbClient.from(TABLE).insert(diaries);
    if (insErr) throw insErr;
    setSyncStatus('', '已同步 · ' + new Date().toLocaleTimeString());
    showToast('⬆️ 已上传 ' + diaries.length + ' 篇日记到云端');
  } catch (e) {
    setSyncStatus('offline', '上传失败');
    showToast('❌ 上传失败: ' + e.message);
  }
}

async function forceSync() {
  await syncFromCloud();
}

async function saveToCloud(diary) {
  try {

}

// ===== 保存 =====
async function saveDiary() {
  if (!currentUser) { showToast('请先登录'); showAuthScreen(); return; }
  const date = document.getElementById('diary-date').value;
  const title = document.getElementById('diary-title').value.trim();
  const content = document.getElementById('diary-content').value.trim();
  const visibility = document.getElementById('diary-visibility').value;
  if (!title && !content) { alert('请写点什么吧~'); return; }

  setSyncStatus('syncing', '保存中...');
  if (editingId !== null) {
    const updated = { ...diaries[editingId], date, title, content, mood: selectedMood, weather: selectedWeather, tags: currentTags, visibility, updated: new Date().toISOString(), user_id: currentUser.id };
    diaries[editingId] = updated;
    await saveToCloud(updated);
    editingId = null;
  } else {
    const newDiary = { id: Date.now(), date, title, content, mood: selectedMood, weather: selectedWeather, tags: currentTags, visibility, pinned: false, created: new Date().toISOString(), user_id: currentUser.id };
    diaries.push(newDiary);
    await saveToCloud(newDiary);
  }
  localStorage.setItem('diaries', JSON.stringify(diaries));
  localStorage.removeItem('diary-draft');
  document.getElementById('draftBadge').style.display = 'none';
  clearForm();
  setSyncStatus('', '已同步 · ' + new Date().toLocaleTimeString());
  showToast('✅ 保存成功！');
}

function clearForm() {
  document.getElementById('diary-title').value = '';
  document.getElementById('diary-content').value = '';
  document.getElementById('diary-date').valueAsDate = new Date();
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  selectedMood = ''; selectedWeather = ''; currentTags = [];
  renderTags(); updateWordCount();
  editingId = null;
  document.getElementById('draftBadge').style.display = 'none';
}

function editDiary(id) {
  const d = diaries.find(x => x.id === id);
  if (!d) return;
  document.getElementById('diary-date').value = d.date;
  document.getElementById('diary-title').value = d.title || '';
  document.getElementById('diary-content').value = d.content || '';
  document.querySelectorAll('.mood-row .emoji-btn').forEach(b => b.classList.toggle('selected', b.dataset.mood === d.mood));
  document.querySelectorAll('.weather-row .emoji-btn').forEach(b => b.classList.toggle('selected', b.dataset.weather === d.weather));
  selectedMood = d.mood || ''; selectedWeather = d.weather || '';
  currentTags = [...(d.tags || [])]; renderTags(); updateWordCount();
  document.getElementById('diary-visibility').value = d.visibility || 'private';
  editingId = diaries.indexOf(d);
  switchTab('write', document.querySelectorAll('.tab-btn')[0]);
}

async function deleteDiary(id) {
  if (!confirm('确定删除这篇日记吗？')) return;
  diaries = diaries.filter(x => x.id !== id);
  localStorage.setItem('diaries', JSON.stringify(diaries));
  await deleteFromCloud(id);
  renderList();
  showToast('🗑️ 已删除');
}

async function togglePin(id) {
  const d = diaries.find(x => x.id === id);
  if (d) {
    d.pinned = !d.pinned;
    localStorage.setItem('diaries', JSON.stringify(diaries));
    await saveToCloud(d);
    renderList();
  }
}

function copyDiary(id) {
  const d = diaries.find(x => x.id === id);
  if (!d) return;
  const text = `【${d.title || '无标题'}】\n📅 ${d.date} ${d.mood || ''} ${d.weather || ''}\n${d.tags ? d.tags.map(t=>'#'+t).join(' ') : ''}\n\n${d.content}`;
  navigator.clipboard.writeText(text).then(() => showToast('📋 已复制'));
}

// ===== 列表渲染 =====
function renderList() {
  const keyword = document.getElementById('search').value.toLowerCase();
  const fm = document.getElementById('filterMood').value;
  const ft = document.getElementById('filterTag').value;
  const sort = document.getElementById('filterSort').value;

  const allTags = [...new Set(diaries.flatMap(d => d.tags || []))];
  const tagSel = document.getElementById('filterTag');
  const curTag = tagSel.value;
  tagSel.innerHTML = '<option value="">所有标签</option>' + allTags.map(t => `<option value="${t}" ${t===curTag?'selected':''}>#${t}</option>`).join('');

  let filtered = diaries.filter(d =>
    (!keyword || (d.title||'').toLowerCase().includes(keyword) || (d.content||'').toLowerCase().includes(keyword)) &&
    (!fm || d.mood === fm) &&
    (!ft || (d.tags||[]).includes(ft))
  );
  filtered.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
  if (sort === 'date-desc') filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  else if (sort === 'date-asc') filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  else if (sort === 'len-desc') filtered.sort((a,b) => (b.content||'').length - (a.content||'').length);
  filtered.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));

  const list = document.getElementById('diary-list');
  const stats = document.getElementById('stats');
  const totalDays = new Set(diaries.map(d => d.date)).size;
  const happy = diaries.filter(d => ['😊','😍','🎉'].includes(d.mood)).length;
  const totalWords = diaries.reduce((s,d) => s + (d.content||'').length, 0);
  stats.innerHTML = `
    <div class="stat-card"><div class="num">${diaries.length}</div><div class="label">篇日记</div></div>
    <div class="stat-card"><div class="num">${totalDays}</div><div class="label">天记录</div></div>
    <div class="stat-card"><div class="num">${happy}</div><div class="label">开心时刻</div></div>
    <div class="stat-card"><div class="num">${totalWords}</div><div class="label">总字数</div></div>
  `;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">📭 没有匹配的日记</div>';
    return;
  }
  list.innerHTML = filtered.map(d => {
    const vis = d.visibility || 'private';
    const visLabel = vis === 'public' ? '<span class="visibility-badge vis-public">🌍 公开</span>' : vis === 'friends' ? '<span class="visibility-badge vis-friends">👥 好友可见</span>' : '<span class="visibility-badge vis-private">🔒 私密</span>';
    return `
    <div class="diary-item ${d.pinned?'pinned':''}">
      <div class="meta">
        <span class="date">📅 ${d.date || '未设置'} ${d.pinned?'📌':''} ${visLabel}</span>
        <span class="mood-weather">${d.mood || ''} ${d.weather || ''}</span>
      </div>
      ${d.title ? `<h3>${escapeHtml(d.title)}</h3>` : ''}
      <div class="content">${escapeHtml(d.content)}</div>
      ${d.tags && d.tags.length ? `<div class="tags">${d.tags.map(t=>`<span>#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="actions">
        <button class="btn-edit" onclick="editDiary(${d.id})">✏️ 编辑</button>
        <button class="btn-del" onclick="deleteDiary(${d.id})">🗑 删除</button>
        <button class="btn-pin" onclick="togglePin(${d.id})">${d.pinned?'取消置顶':'📌 置顶'}</button>
        <button class="btn-copy" onclick="copyDiary(${d.id})">📋 复制</button>
      </div>
    </div>
  `}).join('');
}

// ===== 日历 =====
function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calTitle').textContent = `${y}年 ${m+1}月`;
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m+1, 0).getDate();
  const today = new Date();
  const diaryDates = {};
  diaries.forEach(d => { if (d.date) { diaryDates[d.date] = (diaryDates[d.date]||0)+1; } });

  let html = '';
  const prevDays = new Date(y, m, 0).getDate();
  for (let i = first-1; i >= 0; i--) {
    html += `<td><div class="cal-day other-month">${prevDays - i}</div></td>`;
  }
  for (let d = 1; d <= days; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = diaryDates[ds];
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    html += `<td><div class="cal-day ${has?'has-diary':''} ${isToday?'today':''}" onclick="showDayDiaries('${ds}')">${d}${has?`<div class="dot"></div>`:''}</div></td>`;
    if ((first + d) % 7 === 0) html += '</tr><tr>';
  }
  const total = first + days;
  const remain = (7 - total % 7) % 7;
  for (let i = 1; i <= remain; i++) {
    html += `<td><div class="cal-day other-month">${i}</div></td>`;
  }
  document.getElementById('calBody').innerHTML = '<tr>' + html + '</tr>';
  document.getElementById('calDayDiaries').innerHTML = '';
}
function changeMonth(delta) {
  calDate.setMonth(calDate.getMonth() + delta);
  renderCalendar();
}
function showDayDiaries(ds) {
  const items = diaries.filter(d => d.date === ds);
  const box = document.getElementById('calDayDiaries');
  if (items.length === 0) {
    box.innerHTML = `<div class="empty">📭 ${ds} 没有日记</div>`;
    return;
  }
  box.innerHTML = `<h3 style="margin-bottom:12px;color:var(--primary)">📌 ${ds} 的日记</h3>` + items.map(d => `
    <div class="diary-item">
      <div class="meta"><span class="date">📅 ${d.date}</span><span class="mood-weather">${d.mood||''} ${d.weather||''}</span></div>
      ${d.title?`<h3>${escapeHtml(d.title)}</h3>`:''}
      <div class="content">${escapeHtml(d.content)}</div>
    </div>
  `).join('');
}

// ===== 设置页统计 =====
function renderSettingsStats() {
  const totalWords = diaries.reduce((s,d) => s + (d.content||'').length, 0);
  const allTags = [...new Set(diaries.flatMap(d => d.tags || []))];
  const moods = {};
  diaries.forEach(d => { if (d.mood) moods[d.mood] = (moods[d.mood]||0)+1; });
  const topMood = Object.entries(moods).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('settingsStats').innerHTML = `
    总日记数：${diaries.length} 篇<br>
    总字数：${totalWords} 字<br>
    平均每篇：${diaries.length ? Math.round(totalWords/diaries.length) : 0} 字<br>
    标签数：${allTags.length} 个<br>
    最常用心情：${topMood ? topMood[0] + ' (' + topMood[1] + '次)' : '无'}<br>
    数据大小：${(JSON.stringify(diaries).length/1024).toFixed(1)} KB
  `;
}

// ===== 导出导入 =====
function exportData() {
  const blob = new Blob([JSON.stringify(diaries, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diary-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function exportTxt() {
  const txt = diaries.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(d =>
    `════════════════════════\n${d.date} ${d.mood||''} ${d.weather||''}\n【${d.title||'无标题'}】\n${d.tags?d.tags.map(t=>'#'+t).join(' '):''}\n\n${d.content}\n`
  ).join('\n');
  const blob = new Blob([txt], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diary-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw 0;
      if (confirm(`导入 ${data.length} 篇日记？将与现有数据合并。`)) {
        diaries = [...diaries, ...data];
        localStorage.setItem('diaries', JSON.stringify(diaries));
        showToast('✅ 导入成功，可点击"上传到云端"同步');
        renderList();
      }
    } catch { showToast('❌ 文件格式错误'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
async function clearAllData() {
  if (!confirm('⚠️ 确定清空所有日记？此操作不可恢复！')) return;
  if (!confirm('再次确认：真的要删除全部日记吗？（含云端）')) return;
  try { await sbClient.from(TABLE).delete().neq('id', 0); } catch(e){}
  diaries = [];
  localStorage.setItem('diaries', '[]');
  showToast('已清空');
  renderList();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ===== 网络状态监听 =====
window.addEventListener('online', () => { isOnline = true; showToast('🌐 网络已恢复'); syncFromCloud(); });
window.addEventListener('offline', () => { isOnline = false; setSyncStatus('offline', '离线模式'); });

// ===== 初始化 =====
loadDraft();
// 启动时检查登录状态
checkAuth();
// 每15秒检查好友请求
setInterval(() => { if (currentUser) loadFriends(); }, 15000);
